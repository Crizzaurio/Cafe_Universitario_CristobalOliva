<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css\estilos.css">
    <title>Café Universitario</title>
</head>
<body>
    <header>
        <img src="img/cafe_png.png" alt="logo" height="120px"">
        <div class="navegacion">
            <nav>
                <a href="inicio">Inicio</a>
                <a href="nosotros">Nosotros</a>
                <a href="productos">Productos</a>
                <a href="contact">Contacto</a>
            </nav>
        </div>
        <div id="sesion">
            <button id="iniciarSesion">Iniciar Sesion</button>
            <button id="unete">Únete</button>
        </div>
    </header>
    <main>
        <div id="banner">
            <img src="img/banner_granos_cafe.png" alt="banner" width="1600" height="300">
        </div>
        <div id="productos">
            PRODUCTOS
        </div>

        <div id="formulario">
            <h3>Opina de nuestro café Universitario!</h3>
            <form id="registro">
                <label class="formulario">Nombre completo:</label>
                <input type="text" class="formulario">

                <label class="formulario">Correo electrónico</label>
                <input type="text" class="formulario">

                <label class="formulario">Producto favorito</label>
                <select class="formulario">
                    <option>Selecciona tu preferencia</option>
                    <option value="cafe">Café</option>
                    <option value="te">Té</option>
                    <option value="mokka">Mokka</option>
                    <option value="latte">Latte</option>

                <label class="formulario">Teléfono</label>
                <input type="tel" class="formulario">

                <label class="formulario">Puntuación</label>
                <input type="range" class="formulario">
            </form>
        </div>
        <section id="tabla">
            <table id="tablaDeInteres">
                <thead>
                    <tr class="tr">
                        <th>Nombre</th>
                        <th>Producto favorito</th>
                        <th>Fecha</th>
                    </tr>
                </thead>
            </table>
        </section>



    </main>

    <footer>
        <div id="logo">LOGO</div>
        <div id="contacto">
            CONTACTO
        </div>
        <div id="redes">
            REDES SOCIALES
        </div>


    </footer>


<script src="js\script.js"></script>
</body>
</html>
